name: Bug Report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the app
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: "Ubuntu 24.04 LTS"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python3 --version"
    validations:
      required: true

  - type: input
    id: pyqt6
    attributes:
      label: PyQt6 version
      placeholder: "python3 -c \"import PyQt6; print(PyQt6.QtCore.PYQT_VERSION_STR)\""
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output or traceback
      render: shell
