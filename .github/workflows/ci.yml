name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt6 python3-venv

      - name: Create virtual environment
        run: |
          python3 -m venv --system-site-packages .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: |
          . .venv/bin/activate
          python -m unittest discover -s tests

      - name: Lint
        run: |
          . .venv/bin/activate
          python -m ruff check .

      - name: Type check
        run: |
          . .venv/bin/activate
          python -m mypy src
