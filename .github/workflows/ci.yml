name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system PyQt6
        run: sudo apt-get update && sudo apt-get install -y python3-pyqt6 python3-venv

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv with system-site-packages
        run: python -m venv --system-site-packages .venv

      - name: Install project (editable + dev extras)
        run: .venv/bin/pip install -e ".[dev]"

      - name: Lint with Ruff
        run: .venv/bin/ruff check src tests

      - name: Type-check with mypy
        run: .venv/bin/mypy src

      - name: Run tests (offscreen)
        run: |
          QT_QPA_PLATFORM=offscreen PYTHONPATH=src \
            .venv/bin/python -m unittest discover -s tests -v
